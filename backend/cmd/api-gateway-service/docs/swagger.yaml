basePath: /
definitions:
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  handlers.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: correct-horse-battery-staple
        type: string
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      name:
        example: Ada Lovelace
        type: string
      password:
        example: correct-horse-battery-staple
        type: string
    type: object
  handlers.TokenResponse:
    properties:
      token:
        type: string
    type: object
  models.User:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
info:
  contact: {}
  description: Authentication endpoints and a health check.
  title: SyncDocs API Gateway
  version: "1.0"
paths:
  /login:
    post:
      consumes:
        - application/json
      parameters:
        - description: Login payload
          in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/handlers.LoginRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/handlers.TokenResponse"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/handlers.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/handlers.ErrorResponse"
      summary: Login a user
      tags:
        - auth
  /register:
    post:
      consumes:
        - application/json
      parameters:
        - description: Registration payload
          in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/handlers.RegisterRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/models.User"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/handlers.ErrorResponse"
      summary: Register a new user
      tags:
        - auth
schemes:
  - http
swagger: "2.0"

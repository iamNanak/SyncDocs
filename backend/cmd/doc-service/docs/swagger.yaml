basePath: /
definitions:
  handlers.CreateDocumentRequest:
    properties:
      title:
        example: My first doc
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  models.Document:
    properties:
      created_at:
        type: string
      id:
        type: string
      owner_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact: {}
  description: Document creation and listing APIs.
  title: SyncDocs Document Service
  version: "1.0"
paths:
  /docs:
    get:
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: "#/definitions/models.Document"
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/handlers.ErrorResponse"
      security:
        - BearerAuth: []
      summary: List documents
      tags:
        - documents
    post:
      consumes:
        - application/json
      parameters:
        - description: Document payload
          in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/handlers.CreateDocumentRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/models.Document"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/handlers.ErrorResponse"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/handlers.ErrorResponse"
      security:
        - BearerAuth: []
      summary: Create a document
      tags:
        - documents
schemes:
  - http
securityDefinitions:
  BearerAuth:
    description: Use "Bearer <token>"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
